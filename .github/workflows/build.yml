name: Build
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle
      - run: chmod +x gradlew
      - run: ./gradlew clean build --stacktrace
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: zonewars-jar
          path: build/libs/*.jar
          if-no-files-found: error
